<!DOCTYPE html>
<head>

<title>OrchOS</title>

</head>

<style>

*{
    font-family:Georgia, sans-serif;
    margin:0;
    padding:0;
}

img{
    transition:0.2s;
}

img:hover{
    transform:scale(1.1);
}

</style>

<body style="background-image:url('ChatGPT Image Jun 11, 2026, 06_25_12 PM.png');background-size:cover;background-position:center;height:100vh;overflow:hidden;">

        <div style="position:absolute;top:0;left:0;width:100%;display:flex;backdrop-filter:blur(10px);background-color:rgba(0,0,0,0.25);color:white;justify-content:space-between;align-items:center;padding:10px 20px;box-shadow:0px 4px 15px rgba(0,0,0,0.952);">

            <p style="display:flex;align-items:center;gap:8px;">
                 <img src="Oot_Ocarina_of_Time.png" alt="Ocarina of Time" width="30" height="30">
                <b>OrchOS</b>
            </p>

            <p id="timeElement">
                Loading...
            </p>

        </div>

        <script>

        function updateTime() {

            var options = {
                weekday:'short',
                month:'short',
                day:'numeric',
                hour:'numeric',
                minute:'2-digit',
                second:'2-digit'
            };

            var currentTime =
            new Date().toLocaleString('en-US', options);

            document.getElementById("timeElement").innerHTML =
            currentTime;

        }

        updateTime();

        setInterval(updateTime,1000);

        </script>

        <div style="display:flex;position:absolute;bottom:15px;left:50%;transform:translateX(-50%);border-radius:10px;padding:10px 25px;backdrop-filter:blur(10px) saturate(130%);background-color:rgba(0,0,0,0.25);color:white;box-shadow:0px 4px 15px rgba(0,0,0,0.952);">

            <img src="Oot_Ocarina_of_Time.png"
                 alt="Ocarina of Time"
                 width="40"
                 height="40"
                 style="cursor:pointer;">

        </div>

</body>
