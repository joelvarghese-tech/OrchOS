                 Loading...
            </button>

        <script>

        function updateTime() {

            var options = {
                
                month:'short',
                day:'numeric',
                year:'numeric',

                hour:'numeric',
                minute:'2-digit',
                
            };

            var currentTime =
            new Date().toLocaleString('en-US', options);

            document.getElementById("timeElement").innerHTML =
            currentTime;

        }

        updateTime();

        setInterval(updateTime,1000);

        </script>

        <script>

function openWindow() {

    var win =
    document.getElementById("window");

    win.style.display = "block";

    setTimeout(function(){

        win.style.opacity = "1";

        win.style.transform =
        "translateX(-50%) scale(1)";

    },10);

}

function closeWindow() {

    var win =
    document.getElementById("window");

    win.style.opacity = "0";

    win.style.transform =
    "translateX(-50%) scale(0.8)";

    setTimeout(function(){

        win.style.display = "none";

    },250);

}

</script>
        
<script src="script.js"></script>

<div id="window" style="
display:none;
position:absolute;
top:20%;
left:50%;
transform:translateX(-50%) scale(0.8);
width:500px;
padding:20px;

backdrop-filter:blur(15px);
background-color:rgba(0,0,0,0.35);
color:white;
box-shadow:0px 4px 15px rgba(0,0,0,0.95);
opacity:0;
transition:opacity 0.25s ease, transform 0.25s ease;
">
